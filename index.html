<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 칭찬 배달부</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --secondary-color: #ffeaa7;
            --background-color: #f7f9fc;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #2d3436;
            margin-top: 20px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .name-input {
            flex: 2 !important;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            height: 100px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e17055;
        }
    </style>
</head>
<body>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {alert('칭찬이 스프레드시트로 안전하게 배달되었습니다! 🎉'); location.reload();}"></iframe>

<div class="container">
    <h1>💌 우리반 칭찬 배달부</h1>
    
    <form id="praiseForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSeysPxyX3pcG9vmDTNa3nNbV9jsha8MTg8kZbwV_XVTWduUjA/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
        
        <div class="section-title">🎯 칭찬 받을 친구</div>
        <div class="form-group">
            <input type="number" name="entry.366340186" placeholder="학년" min="1" max="6" required>
            <input type="number" name="entry.839701348" placeholder="반" min="1" max="15" required>
            <input type="text" name="entry.47682032" class="name-input" placeholder="이름" required>
        </div>

        <div class="section-title">✏️ 칭찬 한마디</div>
        <textarea name="entry.221747202" placeholder="친구에게 전하고 싶은 칭찬을 적어주세요!" required></textarea>

        <div class="section-title">✍️ 보내는 사람</div>
        <div class="form-group">
            <input type="number" name="entry.1447908321" placeholder="학년" min="1" max="6" required>
            <input type="number" name="entry.1903374255" placeholder="반" min="1" max="15" required>
            <input type="text" id="senderNameInput" class="name-input" placeholder="이름" required>
        </div>

        <button type="submit">칭찬 배달하기 🚀</button>
    </form>
</div>

<script>
    let submitted = false;
    document.getElementById('praiseForm').addEventListener('submit', function() {
        document.getElementById('senderNameInput').name = "entry.1030999557"; 
    });
</script>

</body>
</html>
